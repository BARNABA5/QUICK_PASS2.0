<!DOCTYPE html>
<html lang="en">
<head>

<title>QuickPass | Smart Ticketing</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header class="navbar">
    <h1 class="logo">QuickPass</h1>
</header>

<section class="hero">

</section>

    <div class="event-container">

        <div class="event-card">
            <h3>Arican Sunday YSC 2026</h3>

            <button onclick="goToBooking('Arican Sunday YSC 2026')">
                Book Now
            </button>
        </div>

        <div class="event-card">
            <h3>Talanta Championship</h3>
            <p>Date: 25 Oct 2026</p>
            <button onclick="goToBooking('Talanta Championship')">
                Book Now
            </button>
        </div>

        <div class="event-card">
            <h3>Youth Conference</h3>
            <p>Date: 15 May 2026</p>
            <button onclick="goToBooking('Youth Conference')">
                Book Now
            </button>
        </div>

        <div class="event-card">
            <h3>Easter Extravaganda 2026</h3>
            <p>Date: 16 April 2026</p>
            <button onclick="goToBooking('Easter Extravaganda 2026')">
                Book Now
            </button>
        </div>

    </div>

</section>

<script src="script.js"></script>
</body>
</html>
