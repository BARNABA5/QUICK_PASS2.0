<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Ticket | QuickPass</title>

<link rel="stylesheet" href="style.css">

<!-- QR CODE LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>
<body>

<header class="navbar">
    <h1 class="logo">QuickPass</h1>
</header>

<section class="booking">

<h2>Book Ticket</h2>

<form id="bookingForm" class="container">

<input type="text" id="event" placeholder="Event Name" readonly required>

<input type="text" id="name" placeholder="Full Name" required>

<input type="text" id="phone" placeholder="Phone Number" required>

<input type="number" id="tickets" placeholder="Number of Tickets" required min="1">

<select id="category" required>
    <option value="">Select Category</option>
    <option value="Regular">Regular</option>
    <option value="VIP">VIP</option>
    <option value="VVIP">VVIP</option>
</select>

<p><strong>Total Price: </strong>KES <span id="total">0</span></p>

<select id="payment" required>
    <option value="">Payment Method</option>
    <option value="Mpesa">MPESA</option>
    <option value="Card">Card</option>
    <option value="Paypal">PayPal</option>
    <option value="Bank">Bank</option>
</select>

<button type="submit">Confirm Booking</button>

</form>

<!-- RECEIPT SECTION -->
<div id="receipt" style="display:none; text-align:center; margin-top:30px;">
    <h2>🎟 Ticket Receipt</h2>
    <p id="receiptDetails"></p>
    <div id="qrcode"></div>
</div>

</section>

<script src="script.js"></script>
<style> 
    
/* =========================
   GLOBAL STYLES
========================= */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #111827);
    color: white;
    min-height: 100vh;
}

/* =========================
   NAVBAR
========================= */

.navbar {
    background: rgba(17, 24, 39, 0.95);
    padding: 20px;
    text-align: center;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.logo {
    color: #22d3ee;
    font-size: 24px;
    font-weight: bold;
}

/* =========================
   BOOKING SECTION
========================= */

.booking {
    padding: 40px 20px;
    text-align: center;
}

.booking h2 {
    margin-bottom: 20px;
    font-size: 28px;
    color: #22d3ee;
}

/* =========================
   FORM CONTAINER
========================= */

.container {
    background: #1e293b;
    max-width: 450px;
    margin: auto;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* =========================
   INPUT FIELDS
========================= */

.container input,
.container select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    outline: none;
    font-size: 14px;
}

/* =========================
   TOTAL PRICE
========================= */

.container p {
    margin: 15px 0;
    font-size: 16px;
}

#total {
    color: #22d3ee;
    font-weight: bold;
}

/* =========================
   BUTTON STYLE
========================= */

.container button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #4f46e5, #22d3ee);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
}

.container button:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 20px rgba(34,211,238,0.5);
}

/* =========================
   RECEIPT SECTION
========================= */

#receipt {
    background: #1e293b;
    max-width: 400px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

#receipt h2 {
    color: #22d3ee;
    margin-bottom: 15px;
}

#receiptDetails {
    margin-bottom: 15px;
    font-size: 14px;
}

/* =========================
   QR CODE CENTER
========================= */

#qrcode {
    display: flex;
    justify-content: center;
    margin-top: 10px;
}

/* =========================
   MOBILE RESPONSIVE
========================= */

@media (max-width: 600px) {

    .container {
        width: 90%;
    }

    #receipt {
        width: 90%;
    }

}
</style>

</body>
</html>
